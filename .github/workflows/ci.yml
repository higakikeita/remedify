name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python -m unittest discover tests -v
      - name: Smoke test (examples)
        run: |
          for f in examples/trivy-*.json; do
            echo "=== $f ==="
            python remedify.py "$f"
            python remedify.py "$f" --format shell > /dev/null
            python remedify.py "$f" --format json | python -m json.tool > /dev/null
          done
          python remedify.py examples/sysdig-report.csv
          python remedify.py examples/sysdig-report.csv --format json | python -m json.tool > /dev/null
          python remedify.py examples/sysdig-scan-result.json
          python remedify.py examples/sysdig-scan-result.json --format shell > /dev/null
