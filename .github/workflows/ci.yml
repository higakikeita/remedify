name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python -m unittest discover tests -v
      - name: Smoke test (examples)
        run: |
          python remedify.py examples/trivy-ubuntu.json
          python remedify.py examples/trivy-rhel.json --min-severity HIGH
          python remedify.py examples/trivy-real-ubuntu1804.json --format shell
          python remedify.py examples/trivy-ubuntu.json --format json | python -m json.tool > /dev/null
