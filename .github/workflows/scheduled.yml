name: Scheduled maintenance

# A single-file, zero-dependency tool still rots: Python releases, distro EOL
# dates, and scanner JSON schemas all drift. This weekly run catches that drift
# without anyone remembering to look — the maintenance-offload half of "how do
# we keep this alive."

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch: {}

# Least privilege: read-only by default; only the EOL-refresh job below is
# granted write (it opens a PR). Matches README's "self-maintaining" claim.
permissions:
  contents: read

jobs:
  deep-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Full test suite
        run: python -m unittest discover tests -v
      - name: Deep dpkg property test (vs. real dpkg)
        run: DPKG_PROP_N=20000 python -m unittest tests.test_dpkg_property -v
      - name: Deep fuzz pass
        run: FUZZ_N=20000 python -m unittest tests.test_fuzz -v

  refresh-eol-snapshot:
    # Regenerate the vendored EOL snapshot from endoflife.date and open a PR if
    # it changed. remedify stays offline at runtime; only this job hits the net.
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the auto/eol-refresh branch
      pull-requests: write   # open the refresh PR
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh eol_data.json
        run: python scripts/update_eol.py
      - name: Open PR if the snapshot changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh EOL snapshot from endoflife.date"
          title: "chore: refresh EOL snapshot"
          body: "Automated weekly refresh of `eol_data.json` from endoflife.date."
          branch: auto/eol-refresh
          add-paths: eol_data.json

  scanner-schema-smoke:
    # Pulls a current Trivy golden file and confirms our parser still accepts
    # the live schema (fails loudly if Trivy changed its JSON shape).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch a current Trivy golden file and parse it
        run: |
          url=https://raw.githubusercontent.com/aquasecurity/trivy/main/integration/testdata/ubuntu-1804.json.golden
          curl -fsSL "$url" -o /tmp/live-trivy.json
          python remedify.py /tmp/live-trivy.json > /dev/null
          echo "Trivy schema still parses OK"
